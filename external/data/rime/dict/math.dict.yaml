---
name: math
version: "1.1"
sort: original              # 按字頻排序
# by_weight（按字频排序）：  
# original（按词典原始顺序）：  
# by_length（按长度排序）：  
# by_code（按编码顺序）：  
# custom（自定义排序）：  
use_preset_vocabulary: true  # 導入八股文字頻
max_phrase_length: 1         # 不生成詞彙
columns:
  - text
  - code
  - weight
  - stem
encoder:
  exclude_patterns:
    - '^z.*$'
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 10]
      formula: "AaBaCaZa"
...


